<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#f5f2ed">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="PrintGuard Scan Capture">
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('pg_theme') === 'dark' ? 'dark' : 'light';
        document.documentElement.dataset.theme = theme;
        var metaTheme = document.querySelector('meta[name="theme-color"]');
        if (metaTheme) metaTheme.setAttribute('content', theme === 'dark' ? '#171512' : '#f5f2ed');
      } catch (_) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=7.0.9">
  <title>PrintGuard — Scan Capture</title>
  <style>
    .scan-shell { max-width: 900px; margin: 0 auto; }
    .scan-actions {
      display: flex;
      gap: 8px;
      flex-wrap: nowrap;
      justify-content: flex-end;
      align-items: center;
    }
    .scan-submit {
      width: auto;
      min-width: 170px;
      padding-left: 16px;
      padding-right: 16px;
    }
    .scan-commit {
      width: auto;
      min-width: 210px;
      padding-left: 16px;
      padding-right: 16px;
    }
    .scan-commit:disabled {
      background: var(--bg3);
      border-color: var(--border);
      color: var(--text-faint);
      cursor: not-allowed;
    }
    .scan-hint { margin-top: 6px; }
    .scan-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 10px;
    }
    .scan-meta .pill { cursor: default; }
    .scan-item-card { cursor: default; }
    .scan-item-card .item-card-top { align-items: center; margin-bottom: 10px; }
    .scan-item-card .item-card-code { word-break: break-word; text-transform: none; letter-spacing: .02em; }
    .scan-item-card .item-card-name { font-size: 1.18rem; }
    .scan-item-card .badge { border-color: var(--accent); color: var(--accent); }
    .scan-item-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .scan-item-actions .btn-secondary { width: auto; padding: 8px 12px; }
    .btn-danger { border-color: var(--crit); color: var(--crit); }
    .btn-danger:hover { background: rgba(155,58,47,.10); border-color: var(--crit); color: var(--crit); }
    .scan-status { min-height: 24px; margin-top: 10px; }
    .commit-summary {
      margin-top: 12px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      background: var(--bg4);
      color: var(--text-dim);
      font-size: .78rem;
      line-height: 1.45;
    }
    .commit-summary.hidden { display: none; }
    .commit-summary.warn {
      border-color: rgba(184,115,51,.42);
      background: rgba(184,115,51,.07);
      color: var(--text);
    }
    .commit-summary.crit {
      border-color: rgba(155,58,47,.42);
      background: rgba(155,58,47,.07);
      color: var(--text);
    }
    .commit-summary strong { color: var(--text); }
    .commit-summary-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      margin-top: 8px;
    }
    .commit-summary-grid span {
      display: block;
      padding: 7px 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.32);
      text-align: center;
      white-space: nowrap;
    }
    .scan-echo { margin-top: 8px; font-family: var(--font-d); font-size: 2rem; font-weight: 500; letter-spacing: .04em; word-break: break-word; }
    .scan-divider { height: 1px; background: var(--border); margin: 12px 0; }
    .latest-wrap { display: grid; gap: 10px; margin-bottom: 12px; }
    .latest-card {
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 8%, var(--bg4)), var(--bg4));
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      padding: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .latest-card.duplicate {
      border-left-color: #9b5f2f;
      box-shadow: 0 0 0 1px rgba(155,95,47,.22), 0 18px 32px rgba(155,95,47,.10), var(--shadow);
    }
    .latest-card-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      align-items: flex-start;
      margin-bottom: 10px;
    }
      .latest-card-title {
      font-family: var(--font-d);
      font-size: 1.45rem;
      font-weight: 500;
      letter-spacing: .03em;
    }
    .latest-card-sub {
      font-size: .72rem;
      letter-spacing: var(--wide);
      text-transform: uppercase;
      color: var(--text-faint);
      margin-top: 4px;
    }
    .barcode-preview {
      margin-top: 10px;
      padding: 10px 8px 6px;
      background: linear-gradient(180deg, rgba(0,0,0,.02), rgba(0,0,0,0));
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .barcode-preview svg {
      display: block;
      width: 100%;
      height: 88px;
    }
    .barcode-preview .human-read {
      margin-top: 6px;
      text-align: center;
      font-family: var(--font-ui);
      font-size: .72rem;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--text-dim);
      word-break: break-word;
    }
    .scan-list {
      display: grid;
      gap: 8px;
    }
    .scan-group-card {
      padding: 10px 12px;
    }
    .scan-group-card.duplicate {
      border-color: rgba(155,95,47,.42);
      box-shadow: 0 0 0 1px rgba(155,95,47,.14), 0 14px 24px rgba(155,95,47,.08), var(--shadow);
    }
    .scan-group-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 6px;
    }
    .scan-group-title {
      font-family: var(--font-d);
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: .03em;
      word-break: break-word;
    }
    .scan-group-count {
      font-size: .72rem;
      letter-spacing: var(--wide);
      text-transform: uppercase;
      color: var(--accent);
      white-space: nowrap;
    }
    .scan-group-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      font-size: .72rem;
      color: var(--text-dim);
    }
    .scan-group-meta strong {
      color: var(--text);
      font-weight: 600;
    }
    .scan-group-badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .scan-group-badges .badge {
      border-color: var(--border);
      color: var(--text-dim);
    }
    .scan-item-card.compact {
      padding: 10px 12px;
    }
    .scan-item-card.compact.duplicate {
      border-color: rgba(155,95,47,.42);
      box-shadow: 0 0 0 1px rgba(155,95,47,.16), 0 14px 24px rgba(155,95,47,.08), var(--shadow);
    }
    .scan-item-card.compact .item-card-top { margin-bottom: 6px; }
    .scan-item-card.compact .item-card-name { font-size: 1rem; }
    .scan-item-card.compact .item-card-code { font-size: .58rem; }
    .scan-item-card.compact .scan-item-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      font-size: .72rem;
      color: var(--text-dim);
    }
    .scan-item-card.compact .scan-item-actions { margin-top: 8px; }
    @media (max-width: 640px) {
      .scan-actions { flex-wrap: wrap; }
      .scan-actions .btn-secondary,
      .scan-submit,
      .scan-commit { width: 100%; }
      .commit-summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <div class="brand-lockup">
        <span class="brand-name">PRINTGUARD</span>
        <div class="brand-partner" aria-label="ScanCapture">
          <span class="brand-partner-prefix">SCAN</span>
          <span class="dgfc-wordmark">CAPTURE</span>
        </div>
      </div>
    </div>
    <div class="topbar-center">
      <div class="mode-toggle" aria-hidden="true">
        <button class="mode-btn active" type="button">
          <span>Capture</span>
        </button>
      </div>
    </div>
    <div class="topbar-right">
      <button id="themeToggle" class="icon-btn" type="button" title="Přepnout motiv" aria-label="Přepnout motiv">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"></circle>
          <path d="M12 1v2"></path><path d="M12 21v2"></path>
          <path d="M4.2 4.2l1.4 1.4"></path><path d="M18.4 18.4l1.4 1.4"></path>
          <path d="M1 12h2"></path><path d="M21 12h2"></path>
          <path d="M4.2 19.8l1.4-1.4"></path><path d="M18.4 5.6l1.4-1.4"></path>
        </svg>
      </button>
      <button id="refresh" class="icon-btn" type="button" title="Obnovit" aria-label="Obnovit">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"></polyline>
          <polyline points="1 20 1 14 7 14"></polyline>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
      </button>
    </div>
  </header>

  <main class="screen active scan-shell">
    <div class="screen-header">
      <div>
        <h1>Scan Capture</h1>
        <div class="header-meta" id="server-state">same-origin</div>
      </div>
      <div class="header-actions">
        <div class="pill muted" id="output-path">job-label-scans-YYYY-MM-DD.jsonl</div>
        <div class="pill ok" id="connection-pill">Connected</div>
      </div>
    </div>

    <section class="form-card">
      <div class="scan-meta">
        <div class="pill muted">NAS queue</div>
        <div class="pill muted">Fallback queue enabled</div>
        <div class="pill muted" id="pending-pill">Čeká: —</div>
        <div class="pill muted" id="latest-pending-pill">Poslední čekající: —</div>
      </div>

      <div class="form-grid-2">
        <div class="form-group">
          <label for="operator">Operator</label>
          <input id="operator" type="text" autocomplete="off" spellcheck="false" placeholder="Daniel">
        </div>
        <div class="form-group">
          <label for="station">Station</label>
          <input id="station" type="text" autocomplete="off" spellcheck="false" placeholder="SCAN-STATION-01">
        </div>
        <div class="form-group span2">
          <label for="barcode">Barcode</label>
          <input id="barcode" type="text" autocomplete="off" spellcheck="false" inputmode="text" autofocus placeholder="Scan here and press Enter">
          <div class="hint scan-hint">Scanner types the barcode and sends Enter.</div>
        </div>
      </div>

      <div class="scan-divider"></div>

      <div class="toolbar-row">
        <div>
          <div class="header-meta" id="fallback-note">Using same-origin fetch</div>
          <div id="status" class="header-meta scan-status"></div>
        </div>
        <div class="scan-actions">
          <button id="clear" class="btn-secondary" type="button">Vyčistit</button>
          <button id="manual" class="btn-primary scan-submit" type="button">Zapsat scan</button>
          <button id="commit-scans" class="btn-primary scan-commit" type="button" disabled>Hotovo · Odeslat do PrintGuardu</button>
        </div>
      </div>

      <div id="echo" class="scan-echo"></div>
      <div id="commit-summary" class="commit-summary hidden"></div>

      <div class="scan-divider"></div>

      <div id="recent">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Čekám na první scan…</p>
        </div>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const operatorEl = document.getElementById('operator');
      const stationEl = document.getElementById('station');
      const barcodeEl = document.getElementById('barcode');
      const statusEl = document.getElementById('status');
      const recentEl = document.getElementById('recent');
      const echoEl = document.getElementById('echo');
      const refreshBtn = document.getElementById('refresh');
      const clearBtn = document.getElementById('clear');
      const manualBtn = document.getElementById('manual');
      const commitBtn = document.getElementById('commit-scans');
      const themeToggle = document.getElementById('themeToggle');
      const outputPathEl = document.getElementById('output-path');
      const serverStateEl = document.getElementById('server-state');
      const connectionPill = document.getElementById('connection-pill');
      const fallbackNote = document.getElementById('fallback-note');
      const pendingPill = document.getElementById('pending-pill');
      const latestPendingPill = document.getElementById('latest-pending-pill');
      const commitSummaryEl = document.getElementById('commit-summary');

      const LS_OPERATOR = 'pg_scan_capture_operator';
      const LS_STATION = 'pg_scan_capture_station';
      const LS_THEME = 'pg_theme';
      const DEFAULT_STATION = 'SCAN-STATION-01';

      const state = {
        pending: null,
        pendingStatus: null,
        committing: false,
        recent: [],
        outputDir: '',
        inputDir: '',
      };

      function setTheme(theme) {
        document.documentElement.dataset.theme = theme === 'dark' ? 'dark' : 'light';
        var metaTheme = document.querySelector('meta[name="theme-color"]');
        if (metaTheme) metaTheme.setAttribute('content', theme === 'dark' ? '#171512' : '#f5f2ed');
        localStorage.setItem(LS_THEME, document.documentElement.dataset.theme);
      }

      function setStatus(text, kind) {
        statusEl.textContent = text || '';
        statusEl.style.color = kind === 'err' ? 'var(--crit)' : kind === 'ok' ? 'var(--ok)' : 'var(--text-faint)';
        connectionPill.className = `pill ${kind === 'err' ? 'crit' : 'ok'}`;
        connectionPill.textContent = kind === 'err' ? 'Disconnected' : 'Connected';
      }

      function setEcho(text) {
        echoEl.textContent = text || '';
      }

      function todayFileName() {
        const d = new Date();
        return `job-label-scans-${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}.jsonl`;
      }

      function formatCsTime(value) {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return '';
        return `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
      }

      function formatCsDate(value) {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return String(value || '');
        return `${date.getDate()}.${date.getMonth() + 1}.${date.getFullYear()}`;
      }

      function setCommitSummary(html, kind) {
        commitSummaryEl.className = `commit-summary ${kind || ''}`.trim();
        commitSummaryEl.innerHTML = html || '';
        if (!html) commitSummaryEl.classList.add('hidden');
      }

      function renderPendingStatus() {
        const pending = state.pendingStatus;
        if (!pending) {
          pendingPill.className = 'pill muted';
          pendingPill.textContent = 'Čeká: —';
          latestPendingPill.className = 'pill muted';
          latestPendingPill.textContent = 'Poslední čekající: —';
          commitBtn.disabled = true;
          commitBtn.textContent = state.committing ? 'Odesílám…' : 'Hotovo · Odeslat do PrintGuardu';
          return;
        }
        if (pending.ok === false) {
          const msg = pending.error ? pending.error : 'Commit není dostupný';
          pendingPill.className = 'pill crit';
          pendingPill.textContent = msg;
          latestPendingPill.className = 'pill muted';
          latestPendingPill.textContent = 'Commit není dostupný';
          commitBtn.disabled = true;
          commitBtn.textContent = state.committing ? 'Odesílám…' : 'Hotovo · Odeslat do PrintGuardu';
          return;
        }

        const count = Number(pending.pendingCount || 0);
        pendingPill.className = `pill ${count > 0 ? 'warn' : 'ok'}`;
        pendingPill.textContent = `Čeká: ${count}`;
        const latest = pending.latestPendingScan;
        latestPendingPill.className = 'pill muted';
        latestPendingPill.textContent = latest && latest.barcode
          ? `Poslední čekající: ${latest.barcode}`
          : 'Poslední čekající: —';
        commitBtn.disabled = state.committing || count < 1;
        commitBtn.textContent = state.committing ? 'Odesílám…' : 'Hotovo · Odeslat do PrintGuardu';
      }

      function renderCommitSummary(summary) {
        const unmatched = Number(summary.unmatchedCount || 0) + Number(summary.ambiguousCount || 0);
        const errors = Number(summary.errorCount || 0);
        const kind = errors > 0 ? 'crit' : unmatched > 0 ? 'warn' : '';
        const warning = unmatched > 0
          ? `<div><strong>Pozor:</strong> ${escapeHtml(unmatched)} scanů nemá jednoznačnou shodu v PrintGuardu.</div>`
          : '';
        setCommitSummary(`
          <div><strong>Batch:</strong> ${escapeHtml(summary.batchId || '-')}</div>
          ${warning}
          <div class="commit-summary-grid">
            <span>Načteno <strong>${escapeHtml(summary.totalScansRead || 0)}</strong></span>
            <span>Nové <strong>${escapeHtml(summary.newScansCommitted || 0)}</strong></span>
            <span>Shoda <strong>${escapeHtml(summary.matchedCount || 0)}</strong></span>
            <span>Bez shody <strong>${escapeHtml(unmatched)}</strong></span>
            <span>Přeskočeno <strong>${escapeHtml(summary.duplicateCount || 0)}</strong></span>
            <span>Chyby <strong>${escapeHtml(errors)}</strong></span>
          </div>
        `, kind);
      }

      function refreshOutputPath() {
        outputPathEl.textContent = todayFileName();
      }

      function updateServerLabel() {
        const origin = window.location && window.location.origin ? window.location.origin : 'same-origin';
        serverStateEl.textContent = origin;
        fallbackNote.textContent = `Using same-origin fetch (${origin})`;
      }

      function loadPrefs() {
        const theme = localStorage.getItem(LS_THEME) === 'dark' ? 'dark' : 'light';
        setTheme(theme);
        operatorEl.value = localStorage.getItem(LS_OPERATOR) || '';
        stationEl.value = localStorage.getItem(LS_STATION) || DEFAULT_STATION;
        refreshOutputPath();
        updateServerLabel();
      }

      function savePrefs() {
        localStorage.setItem(LS_OPERATOR, operatorEl.value.trim());
        localStorage.setItem(LS_STATION, stationEl.value.trim());
      }

      function escapeHtml(value) {
        return String(value == null ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function renderBarcodePreview(text) {
        const value = String(text || '').trim();
        if (!value) return '';
        const normalized = `*${value.toUpperCase()}*`;
        const narrow = 2;
        const wide = 5;
        const gap = 2;
        const height = 72;
        const quiet = 14;
        const bars = [];
        let x = quiet;
        for (let i = 0; i < normalized.length; i += 1) {
          const ch = normalized.charCodeAt(i);
          for (let bit = 0; bit < 8; bit += 1) {
            const on = ((ch >> bit) & 1) === 1;
            const w = on ? wide : narrow;
            if (on) bars.push(`<rect x="${x}" y="4" width="${w}" height="${height}" fill="currentColor"></rect>`);
            x += w + gap;
          }
        }
        const width = x + quiet;
        return `
          <svg viewBox="0 0 ${width} ${height + 8}" preserveAspectRatio="none" aria-hidden="true">
            <g opacity="0.92">
              ${bars.join('')}
            </g>
          </svg>
          <div class="human-read">${escapeHtml(value)}</div>
        `;
      }

      function buildScanGroups() {
        const groups = new Map();
        state.recent.forEach((scan) => {
          const barcode = String(scan && scan.barcode ? scan.barcode : '').trim();
          if (!barcode) return;
          if (!groups.has(barcode)) {
            groups.set(barcode, { barcode, scans: [] });
          }
          groups.get(barcode).scans.push(scan);
        });
        return Array.from(groups.values()).map((group) => ({
          barcode: group.barcode,
          scans: group.scans,
          count: group.scans.length,
          latest: group.scans[0],
          latestAt: group.scans[0] && group.scans[0].scannedAt ? group.scans[0].scannedAt : '',
        }));
      }

      function renderRecent() {
        if (!state.recent.length) {
          recentEl.innerHTML = '<div class="loading-state"><div class="spinner"></div><p>Čekám na první scan…</p></div>';
          return;
        }
        const groups = buildScanGroups();
        const latest = groups[0];
        const rest = groups.slice(1);
        const latestIsDuplicate = latest && latest.count > 1;
        const latestTimes = latest ? latest.scans.map((scan) => formatCsTime(scan.scannedAt || '')).filter(Boolean) : [];
        recentEl.innerHTML = `
          <div class="latest-wrap">
            <div class="latest-card${latestIsDuplicate ? ' duplicate' : ''}">
              <div class="latest-card-head">
                <div>
                  <div class="latest-card-title">${escapeHtml(latest ? latest.barcode : '')}</div>
                  <div class="latest-card-sub">${escapeHtml(formatCsDate(latest ? latest.latestAt : ''))}${formatCsTime(latest ? latest.latestAt : '') ? ` · ${escapeHtml(formatCsTime(latest.latestAt || ''))}` : ''} · ${escapeHtml(latest && latest.latest ? latest.latest.operator : '-')} · ${escapeHtml(latest && latest.latest ? latest.latest.station : '-')}</div>
                </div>
                <div class="badge">${latestIsDuplicate ? `${latest.count}×` : 'LAST SCAN'}</div>
              </div>
              <div class="barcode-preview">
                ${renderBarcodePreview(latest ? latest.barcode : '')}
              </div>
              ${latestIsDuplicate ? `<div class="scan-group-badges"><div class="badge">Opakovaný scan</div><div class="badge">${latest.count} pípnutí</div></div>` : ''}
              <div class="scan-group-meta" style="margin-top: 8px;">
                <span><strong>${escapeHtml(latest ? latest.count : 0)}×</strong> zachyceno</span>
                <span>${escapeHtml(latestTimes.join(' · '))}</span>
              </div>
              <div class="scan-item-actions">
                <button class="btn-secondary btn-danger" type="button" data-delete-scan-id="${escapeHtml(latest && latest.latest ? latest.latest.scanId : '')}" data-delete-scan-at="${escapeHtml(latest && latest.latest ? latest.latest.scannedAt : '')}">Smazat poslední</button>
              </div>
            </div>
          </div>
          <div class="scan-list">
            ${rest.map((group) => `
              <div class="item-card scan-group-card${group.count > 1 ? ' duplicate' : ''}">
                <div class="scan-group-head">
                  <div>
                    <div class="scan-group-title">${escapeHtml(group.barcode || '')}</div>
                    <div class="scan-group-meta">
                      <span><strong>${escapeHtml(group.count)}×</strong> naskenováno</span>
                      <span>poslední ${escapeHtml(formatCsDate(group.latestAt || ''))}${formatCsTime(group.latestAt || '') ? ` · ${escapeHtml(formatCsTime(group.latestAt || ''))}` : ''}</span>
                    </div>
                  </div>
                  <div class="badge">${group.count > 1 ? `${group.count}×` : escapeHtml(formatCsDate(group.latestAt || ''))}</div>
                </div>
                <div class="scan-group-meta">
                  <span><strong>${escapeHtml(group.latest && group.latest.operator ? group.latest.operator : '-')}</strong></span>
                  <span>${escapeHtml(group.latest && group.latest.station ? group.latest.station : '-')}</span>
                </div>
                <div class="scan-group-badges">
                  ${group.count > 1 ? '<div class="badge">Dvojitý / opakovaný</div>' : ''}
                  ${group.scans.slice(0, 3).map((scan) => `<div class="badge">${escapeHtml(formatCsTime(scan.scannedAt || ''))}</div>`).join('')}
                </div>
                <div class="scan-item-actions">
                  <button class="btn-secondary btn-danger" type="button" data-delete-scan-id="${escapeHtml(group.latest && group.latest.scanId ? group.latest.scanId : '')}" data-delete-scan-at="${escapeHtml(group.latest && group.latest.scannedAt ? group.latest.scannedAt : '')}">Smazat</button>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      }

      function beep() {
        try {
          const AudioCtx = window.AudioContext || window.webkitAudioContext;
          if (!AudioCtx) return;
          const ctx = new AudioCtx();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.value = 880;
          gain.gain.value = 0.02;
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          setTimeout(() => {
            osc.stop();
            ctx.close().catch(() => {});
          }, 110);
        } catch (_) {}
      }

      async function loadRecent() {
        try {
          const res = await fetch('/recent?count=10', { cache: 'no-store' });
          const data = await res.json();
          if (!res.ok || !data.ok) throw new Error(data.error || 'Failed to load recent scans');
          state.recent = Array.isArray(data.scans) ? data.scans : [];
          state.outputDir = data.outputDir || state.outputDir;
          state.inputDir = data.inputDir || state.inputDir;
          outputPathEl.textContent = data.outputDir ? `${data.outputDir}\\${todayFileName()}` : todayFileName();
          renderRecent();
        } catch (error) {
          setStatus(error.message || 'Failed to load recent scans', 'err');
        }
      }

      async function loadPendingScans() {
        try {
          const res = await fetch('/pending-scans', { cache: 'no-store' });
          const data = await res.json().catch(() => ({}));
          if (!res.ok || !data.ok) throw new Error(data.error || `Pending status failed (${res.status})`);
          state.pendingStatus = data;
        } catch (error) {
          state.pendingStatus = {
            ok: false,
            error: error.message || 'Pending status failed',
          };
        }
        renderPendingStatus();
      }

      async function checkHealth() {
        try {
          const res = await fetch('/health', { cache: 'no-store' });
          const data = await res.json();
          if (!res.ok || !data.ok) throw new Error('Health check failed');
          setStatus(`Connected to ${data.service}`, 'ok');
        } catch (_) {
          setStatus('Cannot reach scan server. Open http://10.25.0.15:17910 or check firewall/Node service.', 'err');
        }
      }

      async function submitScan(barcode) {
        const payload = {
          barcode,
          rawBarcode: barcodeEl.value,
          operator: operatorEl.value.trim(),
          station: stationEl.value.trim(),
        };
        state.pending = payload;
        savePrefs();
        const res = await fetch('/scan', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          cache: 'no-store',
          body: JSON.stringify(payload),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) {
          const error = new Error(data.error || `Scan failed (${res.status})`);
          error.response = data;
          error.status = res.status;
          throw error;
        }
        if (data.outputDir) {
          outputPathEl.textContent = `${data.outputDir}\\${todayFileName()}`;
        }
        return data.entry;
      }

      async function deleteScan(entry) {
        if (!entry || !entry.scanId) return;
        const confirmed = window.confirm(`Opravdu smazat scan ${entry.barcode || entry.scanId}?`);
        if (!confirmed) return;
        try {
          const params = new URLSearchParams({
            scanId: entry.scanId,
            scannedAt: entry.scannedAt || '',
          });
          const res = await fetch(`/scan?${params.toString()}`, {
            method: 'DELETE',
            cache: 'no-store',
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok || !data.ok) throw new Error(data.error || `Delete failed (${res.status})`);
          state.recent = state.recent.filter((row) => row.scanId !== entry.scanId);
          renderRecent();
          loadPendingScans();
          setStatus(`Zrušeno ${entry.barcode || entry.scanId}`, 'ok');
        } catch (error) {
          setStatus(error.message || 'Delete failed', 'err');
        }
      }

      async function commitPendingScans() {
        if (state.committing) return;
        savePrefs();
        state.committing = true;
        renderPendingStatus();
        setCommitSummary('<div>Odesílám čekající scany do PrintGuardu…</div>', '');
        try {
          const res = await fetch('/commit-scans', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            cache: 'no-store',
            body: JSON.stringify({
              committedBy: operatorEl.value.trim(),
              station: stationEl.value.trim(),
            }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok || !data.ok) throw new Error(data.error || `Commit failed (${res.status})`);
          renderCommitSummary(data);
          const unmatched = Number(data.unmatchedCount || 0) + Number(data.ambiguousCount || 0);
          setStatus(
            `Commit dokončen: ${data.newScansCommitted || 0} nových, ${data.matchedCount || 0} spárováno${unmatched ? `, ${unmatched} bez shody` : ''}`,
            unmatched || data.errorCount ? '' : 'ok'
          );
          await loadRecent();
          await loadPendingScans();
        } catch (error) {
          setCommitSummary(`<div><strong>Commit selhal:</strong> ${escapeHtml(error.message || 'Scan commit failed')}</div>`, 'crit');
          setStatus(error.message || 'Scan commit failed', 'err');
        } finally {
          state.committing = false;
          renderPendingStatus();
          barcodeEl.focus();
        }
      }

      async function handleBarcodeSubmit() {
        const barcode = barcodeEl.value.trim();
        if (!barcode) {
          setStatus('Barcode is empty.', 'err');
          barcodeEl.focus();
          return;
        }
        setStatus('Saving scan...', '');
        setEcho(barcode);
        try {
          const entry = await submitScan(barcode);
          state.recent = [entry].concat(state.recent).slice(0, 10);
          renderRecent();
          refreshOutputPath();
          loadPendingScans();
          setStatus(`Saved ${entry.barcode} to NAS`, 'ok');
          barcodeEl.value = '';
          barcodeEl.focus();
          beep();
          state.pending = null;
        } catch (error) {
          const fallbackDir = error && error.response && error.response.fallbackDir;
          if (error && error.status === 503 && fallbackDir) {
            setStatus(`NAS write failed; scan saved to fallback queue: ${fallbackDir}`, 'err');
          } else {
            setStatus('Cannot reach scan server. Open http://10.25.0.15:17910 or check firewall/Node service.', 'err');
          }
          barcodeEl.focus();
          barcodeEl.select();
        }
      }

      barcodeEl.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          handleBarcodeSubmit();
        }
      });

      operatorEl.addEventListener('change', savePrefs);
      stationEl.addEventListener('change', savePrefs);
      themeToggle.addEventListener('click', () => {
        const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
        setTheme(next);
      });
      refreshBtn.addEventListener('click', () => {
        refreshOutputPath();
        updateServerLabel();
        checkHealth();
        loadRecent();
        loadPendingScans();
      });
      clearBtn.addEventListener('click', () => {
        barcodeEl.value = '';
        setStatus('', '');
        setEcho('');
        barcodeEl.focus();
      });
      manualBtn.addEventListener('click', handleBarcodeSubmit);
      commitBtn.addEventListener('click', commitPendingScans);
      recentEl.addEventListener('click', (event) => {
        const btn = event.target && event.target.closest && event.target.closest('[data-delete-scan-id]');
        if (!btn) return;
        const scanId = btn.dataset.deleteScanId;
        const scannedAt = btn.dataset.deleteScanAt;
        const entry = state.recent.find((row) => row.scanId === scanId || (row.scannedAt === scannedAt && row.scanId));
        if (entry) deleteScan(entry);
      });

      window.addEventListener('focus', () => barcodeEl.focus());

      loadPrefs();
      renderRecent();
      renderPendingStatus();
      checkHealth();
      loadRecent();
      loadPendingScans();
      barcodeEl.focus();
    })();
  </script>
</body>
</html>
